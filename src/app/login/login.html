<div style="display: flex; justify-content: center; align-items: center; height: calc(100vh - 80px); background: #f4f4f4;">
  <div style="background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px;">
    
    <h2 style="text-align: center; margin-bottom: 20px; font-family: sans-serif;">
      {{ isLoginMode ? 'Welcome Back!' : 'Create an Account' }}
    </h2>

    <div *ngIf="errorMessage" style="background: #ffe5e5; color: #dc3545; padding: 10px; border-radius: 4px; margin-bottom: 15px; text-align: center; font-size: 0.9rem;">
      {{ errorMessage }}
    </div>

    <form (submit)="$event.preventDefault()" style="display: flex; flex-direction: column; gap: 15px;">
      
      <input type="email" [(ngModel)]="authData.email" name="email" placeholder="Email Address" required style="padding: 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem;" />
      
      <input type="password" [(ngModel)]="authData.password" name="password" placeholder="Password" required style="padding: 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem;" />

      <select *ngIf="!isLoginMode" [(ngModel)]="authData.role" name="role" style="padding: 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; background: white; cursor: pointer;">
        <option value="customer">I am a Customer</option>
        <option value="seller">I want to be a Seller</option>
      </select>

      <button type="button" (click)="onSubmit()" style="background: #dc3545; color: white; border: none; padding: 12px; border-radius: 4px; font-weight: bold; font-size: 1rem; cursor: pointer; margin-top: 10px; transition: background 0.2s;">
        {{ isLoginMode ? 'Log In' : 'Sign Up' }}
      </button>

    </form>

    <div style="text-align: center; margin-top: 20px; font-size: 0.9rem; font-family: sans-serif; color: #555;">
      {{ isLoginMode ? "Don't have an account?" : "Already have an account?" }}
      <a (click)="toggleMode()" style="color: #007bff; cursor: pointer; font-weight: bold; text-decoration: underline; margin-left: 5px;">
        {{ isLoginMode ? 'Sign Up' : 'Log In' }}
      </a>
    </div>

  </div>
</div>
