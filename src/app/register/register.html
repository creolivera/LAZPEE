<div class="auth-card">
  <h2>Join LAZPEE</h2>
  
  <div class="form-group">
    <input type="email" [(ngModel)]="email" placeholder="Email" />
  </div>
  
  <div class="form-group">
    <input type="password" [(ngModel)]="password" placeholder="Password" />
  </div>

  <div class="form-group">
    <select [(ngModel)]="role" style="width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 4px; border: 1px solid #ccc;">
      <option value="customer">I want to buy (Customer)</option>
      <option value="seller">I want to sell (Seller)</option>
    </select>
  </div>
  
  <button class="primary-btn" (click)="register()">Sign Up</button>
  
  <p>Already have an account? <a routerLink="/login">Login here</a></p>
</div>
