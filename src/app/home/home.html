<div class="home-container">
  <section class="categories">
    <div class="cat-item" *ngFor="let cat of categories" 
         (click)="filterByCategory(cat.name)" 
         style="cursor: pointer; transition: transform 0.2s;">
      <div class="icon">{{ cat.icon }}</div><span>{{ cat.name }}</span>
    </div>
  </section>

  <section class="flash-sale">
    <h2>FLASH SALE</h2>
    <div class="product-grid">
      
      <div class="product-card" *ngFor="let prod of displayedProducts">
        <div class="prod-image" style="font-size: 60px; margin-bottom: 10px;">{{ prod.image }}</div>
        <h4>{{ prod.name }}</h4>
        <p class="price" style="color: #f53d2d; font-weight: bold; font-size: 18px;">${{ prod.price }}</p>
        
        <p style="color: gray; font-size: 13px; margin-bottom: 10px;">
          Available: {{ prod.inventory }}
        </p>

        <button (click)="addToCart(prod)" 
                [disabled]="prod.inventory === 0" 
                [style.background]="prod.inventory === 0 ? '#ccc' : '#f53d2d'">
          {{ prod.inventory === 0 ? 'Out of Stock' : 'Add to Cart' }}
        </button>
      </div>

    </div>
  </section>
</div>
